image: python:3.11-slim

stages:
  - quality
  - security
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt
  - python -m pip install bandit black coverage detect-secrets isort mypy pymarkdownlnt pytest pytest-cov ruff safety

ruff:
  stage: quality
  script:
    - python -m ruff check src tests

black:
  stage: quality
  script:
    - python -m black --check src tests

mypy:
  stage: quality
  script:
    - python -m mypy src

import_sorting:
  stage: quality
  script:
    - python -m isort --check-only src tests

markdown_lint:
  stage: quality
  script:
    - python -m pymarkdown scan README.md CONTRIBUTING.md CHANGELOG.md

bandit:
  stage: security
  script:
    - python -m bandit -r src

safety:
  stage: security
  script:
    - python -m safety check -r requirements.txt

secret_detection:
  stage: security
  script:
    - detect-secrets scan --all-files

pytest:
  stage: test
  script:
    - python -m pytest

coverage:
  stage: test
  script:
    - python -m pytest --cov=src --cov-report=term-missing
