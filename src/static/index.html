<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixStruct — Offline Bill Intelligence</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 0.8rem; background: #00b894; padding: 2px 8px; border-radius: 99px; }
    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    /* Upload zone */
    #drop-zone {
      border: 2px dashed #ccc; border-radius: 12px; padding: 3rem;
      text-align: center; cursor: pointer; background: #fff;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.hover { border-color: #6c63ff; background: #f0eeff; }
    #drop-zone p { color: #666; margin-top: 0.5rem; font-size: 0.9rem; }
    #drop-zone input { display: none; }

    /* Progress */
    #progress { display: none; margin: 1.5rem 0; }
    .stages { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .stage {
      padding: 4px 12px; border-radius: 99px; font-size: 0.8rem;
      background: #eee; color: #666;
    }
    .stage.active { background: #6c63ff; color: #fff; }
    .stage.done { background: #00b894; color: #fff; }

    /* Bill cards */
    #bills { margin-top: 2rem; }
    #bills h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; }
    .bill-card {
      background: #fff; border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1rem; border: 1px solid #e5e5e5;
    }
    .bill-card-header { display: flex; justify-content: space-between; align-items: center; }
    .bill-type { font-size: 0.75rem; background: #eee; padding: 2px 8px; border-radius: 99px; }
    .bill-total { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .bill-meta { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .bill-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
    .btn {
      padding: 5px 14px; border-radius: 6px; font-size: 0.8rem;
      border: 1px solid #ddd; background: #f9f9f9; cursor: pointer;
      text-decoration: none; color: #333;
    }
    .btn:hover { background: #eee; }
    .bill-json { display: none; margin-top: 0.75rem; }
    .bill-json pre {
      background: #1a1a2e; color: #a8ff78; padding: 1rem;
      border-radius: 8px; font-size: 0.75rem; overflow-x: auto;
      max-height: 300px; overflow-y: auto;
    }
    .status-failed { border-left: 4px solid #e74c3c; }
    .status-partial { border-left: 4px solid #f39c12; }
    .status-success { border-left: 4px solid #00b894; }
  </style>
</head>
<body>
<header>
  <h1>⚡ PixStruct</h1>
  <span>● Offline</span>
</header>
<main>
  <!-- Upload zone -->
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:2.5rem">🧾</div>
    <strong>Drop a bill image here</strong>
    <p>Hospital bills, restaurant receipts, invoices — JPG, PNG, WEBP</p>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])"/>
  </div>

  <!-- Processing progress -->
  <div id="progress">
    <p style="margin-bottom:0.5rem;font-size:0.9rem;color:#444">Processing...</p>
    <div class="stages">
      <span class="stage" id="s-ocr">OCR</span>
      <span class="stage" id="s-vlm">VLM</span>
      <span class="stage" id="s-slm">SLM</span>
      <span class="stage" id="s-save">Saved</span>
    </div>
  </div>

  <!-- Bills list -->
  <div id="bills">
    <h2>Processed bills</h2>
    <div id="bills-list"></div>
  </div>
</main>

<script>
  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }

  // Drag and drop
  const zone = document.getElementById('drop-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('hover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('hover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('hover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function setStage(stage) {
    ['ocr','vlm','slm','save'].forEach(s => {
      const el = document.getElementById('s-' + s);
      const stages = ['ocr','vlm','slm','save'];
      const idx = stages.indexOf(s);
      const current = stages.indexOf(stage);
      if (idx < current) el.className = 'stage done';
      else if (idx === current) el.className = 'stage active';
      else el.className = 'stage';
    });
  }

  async function handleFile(file) {
    if (!file) return;
    document.getElementById('progress').style.display = 'block';
    setStage('ocr');

    // Simulate stage progression while waiting
    const stageTimer = setInterval(() => {
      const active = document.querySelector('.stage.active');
      if (active && active.id !== 's-save') {
        const next = active.nextElementSibling;
        if (next) { active.className = 'stage done'; next.className = 'stage active'; }
      }
    }, 15000);

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/extract', { method: 'POST', body: formData });
      clearInterval(stageTimer);
      setStage('save');
      document.getElementById('s-save').className = 'stage done';

      const data = await res.json();
      if (!res.ok) {
        alert('Error: ' + (data.detail || 'Processing failed'));
      } else {
        await loadBills();
      }
    } catch (e) {
      clearInterval(stageTimer);
      alert('Error: ' + e.message);
    }

    setTimeout(() => {
      document.getElementById('progress').style.display = 'none';
    }, 1500);
  }

  function toggleJson(billId) {
    const el = document.getElementById('json-' + billId);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  async function loadBills() {
    const res = await fetch('/bills');
    const bills = await res.json();
    const container = document.getElementById('bills-list');

    if (bills.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:0.9rem">No bills yet. Upload one above.</p>';
      return;
    }

    container.innerHTML = bills.map(b => `
      <div class="bill-card status-${b.status}">
        <div class="bill-card-header">
          <div>
            <strong>${b.vendor || 'Unknown vendor'}</strong>
            <span class="bill-type">${b.bill_type.replace('_', ' ')}</span>
          </div>
          <div class="bill-total">₹${b.total ? b.total.toFixed(2) : '—'}</div>
        </div>
        <div class="bill-meta">${b.bill_date || 'Date unknown'} · ${b.status}</div>
        <div class="bill-actions">
          <button class="btn" onclick="toggleJson(${b.id})">{ } JSON</button>
          <a class="btn" href="/bills/${b.id}/export">⬇ Download</a>
        </div>
        <div class="bill-json" id="json-${b.id}">
          <pre>Loading...</pre>
        </div>
      </div>
    `).join('');

    // Lazy-load JSON previews on toggle
    document.querySelectorAll('.bill-json').forEach(el => {
      const billId = el.id.replace('json-', '');
      el.querySelector('pre').addEventListener('click', async () => {
        if (el.querySelector('pre').textContent === 'Loading...') {
          const r = await fetch('/bills/' + billId);
          const d = await r.json();
          el.querySelector('pre').textContent = JSON.stringify(d.structured, null, 2);
        }
      });
    });
  }

  // Load bills on page load
  loadBills();
</script>
</body>
</html>
